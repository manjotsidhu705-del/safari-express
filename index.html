<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Safari ELD</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
  color: black;
}

.loginBox {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 320px;
  text-align: center;
}

input, select {
  width: 100%;
  margin: 6px 0;
  padding: 10px;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: #1e66ff;
  border: none;
  color: white;
  cursor: pointer;
}

.sidebar {
  width: 220px;
  background: #f4f4f4;
  padding: 15px;
  height: 100vh;
  position: fixed;
  left: 0;
  top: 0;
}

h2 { color: #1e66ff; }

.main {
  margin-left: 240px;
  padding: 20px;
}

.card {
  background: #f1f1f1;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
}

.logout {
  background: red;
  border: none;
  margin-top: 20px;
  color: white;
  width: 100%;
}

#map {
  height: 420px;
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
// ---------- STATE ----------
let user = JSON.parse(localStorage.getItem("safari_user"));
let logs = JSON.parse(localStorage.getItem("safari_logs") || "[]");
let dispatches = JSON.parse(localStorage.getItem("safari_dispatch") || "[]");

let page = "dashboard";
let gps = { lat: 34.05, lng: -117.75 };

// MAP
let map = null;
let marker = null;

// ---------- SAVE ----------
function save() {
  localStorage.setItem("safari_user", JSON.stringify(user));
  localStorage.setItem("safari_logs", JSON.stringify(logs));
  localStorage.setItem("safari_dispatch", JSON.stringify(dispatches));
}

// ---------- LOGIN ----------
function login() {
  const username = document.getElementById("username").value;
  const role = document.getElementById("role").value;

  user = { username, role };
  save();
  render();
}

function logout() {
  localStorage.removeItem("safari_user");
  user = null;
  render();
}

// ---------- ACTIONS ----------
function addLog() {
  logs.push({
    truck: "TRK-" + Math.floor(Math.random() * 100),
    miles: Math.floor(Math.random() * 600),
    hours: Math.floor(Math.random() * 10),
  });
  save();
  render();
}

function addDispatch() {
  dispatches.push({
    load: "LOAD-" + Math.floor(Math.random() * 9999),
    status: "pending",
  });
  save();
  render();
}

// ---------- GPS SIM ----------
setInterval(() => {
  gps.lat += (Math.random() - 0.5) * 0.01;
  gps.lng += (Math.random() - 0.5) * 0.01;

  updateMap();
}, 3000);

// ---------- MAP ----------
function initMap() {
  if (map) return;

  map = L.map("map").setView([gps.lat, gps.lng], 13);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap",
  }).addTo(map);

  marker = L.marker([gps.lat, gps.lng]).addTo(map);
}

function updateMap() {
  if (!map || !marker) return;

  marker.setLatLng([gps.lat, gps.lng]);
  map.setView([gps.lat, gps.lng]);
}

// ---------- RENDER ----------
function render() {
  const app = document.getElementById("app");

  if (!user) {
    app.innerHTML = `
      <div class="loginBox">
        <h2>Safari ELD</h2>
        <input id="username" placeholder="Username" />

        <select id="role">
          <option value="admin">Admin</option>
          <option value="dispatcher">Dispatcher</option>
          <option value="driver">Driver</option>
        </select>

        <button onclick="login()">Login</button>
      </div>
    `;
    return;
  }

  app.innerHTML = `
    <div class="sidebar">
      <h2>Safari ELD</h2>
      <p>Role: ${user.role}</p>

      <button onclick="page='dashboard';render()">Dashboard</button>
      <button onclick="page='dispatch';render()">Dispatch</button>
      <button onclick="page='logs';render()">Logs</button>
      <button onclick="page='gps';render()">GPS</button>

      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="main">

      ${page === "dashboard" ? `
        <h2>Dashboard</h2>
        <div class="card">Logs: ${logs.length}</div>
        <div class="card">Dispatches: ${dispatches.length}</div>
      ` : ""}

      ${page === "dispatch" ? `
        <h2>Dispatch</h2>
        <button onclick="addDispatch()">+ Add Dispatch</button>
        ${dispatches.map(d => `
          <div class="card">${d.load} - ${d.status}</div>
        `).join("")}
      ` : ""}

      ${page === "logs" ? `
        <h2>Logs</h2>
        <button onclick="addLog()">+ Add Log</button>
        ${logs.map(l => `
          <div class="card">${l.truck} — ${l.miles} miles — ${l.hours} hrs</div>
        `).join("")}
      ` : ""}

      ${page === "gps" ? `
        <h2>GPS Tracking</h2>

        <div class="card">
          Lat: ${gps.lat.toFixed(5)}<br>
          Lng: ${gps.lng.toFixed(5)}
        </div>

        <div id="map"></div>
      ` : ""}

    </div>
  `;

  // INIT MAP ONLY WHEN GPS PAGE OPENS
  if (page === "gps") {
    setTimeout(initMap, 100);
  }
}

render();
</script>

</body>
</html>
