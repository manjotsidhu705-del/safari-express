<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Safari ELD</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #070a12;
  padding: 15px;
  height: 100vh;
}

h2 {
  color: #1e66ff;
}

button {
  width: 100%;
  margin-top: 10px;
  padding: 10px;
  background: transparent;
  border: 1px solid #1e66ff;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #1e66ff;
}

.logout {
  background: red;
  border: none;
  margin-top: 20px;
}

/* MAIN */
.main {
  flex: 1;
  padding: 20px;
}

.card {
  background: #111a2e;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
}

input, select {
  width: 100%;
  margin: 5px 0;
  padding: 8px;
}

.loginBox {
  margin: auto;
  margin-top: 100px;
  width: 300px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
// ---------- STATE ----------
let user = JSON.parse(localStorage.getItem("safari_user"));
let logs = JSON.parse(localStorage.getItem("safari_logs") || "[]");
let dispatches = JSON.parse(localStorage.getItem("safari_dispatch") || "[]");

let page = "dashboard";

let gps = { lat: 34.05, lng: -117.75 };

// ---------- SAVE ----------
function save() {
  localStorage.setItem("safari_user", JSON.stringify(user));
  localStorage.setItem("safari_logs", JSON.stringify(logs));
  localStorage.setItem("safari_dispatch", JSON.stringify(dispatches));
}

// ---------- LOGIN ----------
function login() {
  const username = document.getElementById("username").value;
  const role = document.getElementById("role").value;

  user = { username, role };
  save();
  render();
}

function logout() {
  localStorage.removeItem("safari_user");
  user = null;
  render();
}

// ---------- ACTIONS ----------
function addLog() {
  logs.push({
    truck: "TRK-" + Math.floor(Math.random() * 100),
    miles: Math.floor(Math.random() * 600),
    hours: Math.floor(Math.random() * 10),
  });
  save();
  render();
}

function addDispatch() {
  dispatches.push({
    load: "LOAD-" + Math.floor(Math.random() * 9999),
    status: "pending",
  });
  save();
  render();
}

// ---------- GPS ----------
setInterval(() => {
  gps.lat += (Math.random() - 0.5) * 0.01;
  gps.lng += (Math.random() - 0.5) * 0.01;
  render();
}, 3000);

// ---------- RENDER ----------
function render() {
  const app = document.getElementById("app");

  // LOGIN SCREEN
  if (!user) {
    app.innerHTML = `
      <div class="loginBox">
        <h2>Safari ELD Login</h2>

        <input id="username" placeholder="Username" />
        
        <select id="role">
          <option value="admin">Admin</option>
          <option value="dispatcher">Dispatcher</option>
          <option value="driver">Driver</option>
        </select>

        <button onclick="login()">Login</button>
      </div>
    `;
    return;
  }

  // MAIN APP
  app.innerHTML = `
    <div class="sidebar">
      <h2>Safari ELD</h2>
      <p>Role: ${user.role}</p>

      <button onclick="page='dashboard';render()">Dashboard</button>
      <button onclick="page='dispatch';render()">Dispatch</button>
      <button onclick="page='logs';render()">Logs</button>
      <button onclick="page='gps';render()">GPS</button>

      <button class="logout" onclick="logout()">Logout</button>
    </div>

    <div class="main">

      ${
        page === "dashboard"
          ? `
          <h2>Dashboard</h2>
          <div class="card">Logs: ${logs.length}</div>
          <div class="card">Dispatches: ${dispatches.length}</div>
        `
          : ""
      }

      ${
        page === "dispatch"
          ? `
          <h2>Dispatch</h2>
          <button onclick="addDispatch()">+ Add Dispatch</button>
          ${dispatches
            .map(
              (d) => `
            <div class="card">${d.load} - ${d.status}</div>
          `
            )
            .join("")}
        `
          : ""
      }

      ${
        page === "logs"
          ? `
          <h2>Truck Logs</h2>
          <button onclick="addLog()">+ Add Log</button>
          ${logs
            .map(
              (l) => `
            <div class="card">
              ${l.truck} — ${l.miles} miles — ${l.hours} hrs
            </div>
          `
            )
            .join("")}
        `
          : ""
      }

      ${
        page === "gps"
          ? `
          <h2>GPS Tracking</h2>
          <div class="card">
            Latitude: ${gps.lat.toFixed(5)}<br>
            Longitude: ${gps.lng.toFixed(5)}
          </div>
        `
          : ""
      }

    </div>
  `;
}

// start
render();
</script>

</body>
</html>
